# Scheduled build: refresh GeoIP CIDRs + Google proxy IPs + deploy
#
# For fork owners:
#   1. Settings → Secrets and variables → Actions → New repository secret
#   2. Add CF_API_TOKEN (Cloudflare API Token with Workers Edit permission)
#   3. Optional: add CF_ACCOUNT_ID
#   4. Uncomment the `schedule` block below to enable automatic weekly builds
#   5. Or trigger manually: Actions → "Refresh & Deploy" → Run workflow

name: Refresh & Deploy

on:
  # Uncomment to enable weekly automatic builds:
  # schedule:
  #   - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        if: ${{ vars.CF_API_TOKEN != '' || secrets.CF_API_TOKEN != '' }}
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
